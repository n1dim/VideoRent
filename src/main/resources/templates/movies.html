<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>VideoRent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #0f0f0f;
            color: #f0f0f0;
        }

        .navbar-custom {
            background-color: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e50914 !important;
            letter-spacing: 1px;
        }

        .search-input {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #f0f0f0;
            border-radius: 6px 0 0 6px;
        }

        .search-input:focus {
            background-color: #2a2a2a;
            border-color: #e50914;
            color: #f0f0f0;
            box-shadow: none;
        }

        .search-input::placeholder {
            color: #888;
        }

        .movie-card {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            transition: transform 0.2s ease, border-color 0.2s ease;
            overflow: hidden;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-color: #e50914;
        }

        .movie-poster {
            background-color: #2a2a2a;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #444;
        }

        .movie-title {
            font-weight: 600;
            font-size: 1rem;
            color: #f0f0f0;
            margin-bottom: 4px;
        }

        .movie-meta {
            font-size: 0.85rem;
            color: #aaa;
        }

        .badge-year {
            background-color: #e50914;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .btn-details {
            background-color: transparent;
            border: 1px solid #e50914;
            color: #e50914;
            font-size: 0.85rem;
            transition: background-color 0.2s;
        }

        .btn-details:hover {
            background-color: #e50914;
            color: #fff;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f0f0f0;
            border-left: 4px solid #e50914;
            padding-left: 12px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-custom px-4 py-3 mb-5">
    <span class="navbar-brand">VIDEO<span style="color:#f0f0f0">RENT</span></span>
    <div class="d-flex align-items-center gap-3">
        <form method="get" th:action="@{/}" class="d-flex">
            <input name="search" type="text" class="form-control search-input"
                   placeholder="Search by title..." th:value="${search}" style="width: 260px;">
            <button type="submit" class="btn btn-danger rounded-0" style="border-radius: 0 6px 6px 0 !important;">Search</button>
        </form>
        <div th:if="${session.currentUser == null}">
            <a th:href="@{/register}" class="btn btn-outline-light btn-sm">Register</a>
            <a th:href="@{/login}" class="btn btn-danger btn-sm ms-2">Login</a>
        </div>
        <div th:if="${session.currentUser != null}" class="d-flex align-items-center gap-3">
            <span th:text="${session.currentUser.fullName}" class="text-light"></span>
            <form method="post" th:action="@{/logout}" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <p th:if="${search != null and !search.isBlank()}" class="section-title mb-0"
               th:text="'Results for: ' + ${search}"></p>
            <p th:if="${search == null or search.isBlank()}" class="section-title mb-0">All Movies</p>
        </div>
        <a th:if="${session.currentUser != null and session.currentUser.role.name() == 'ADMIN'}"
           th:href="@{/movies/add}" class="btn btn-danger btn-sm">+ Add Movie</a>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="col" th:each="movie : ${movies}">
            <div class="movie-card h-100 d-flex flex-column">
                <div class="movie-poster">&#127916;</div>
                <div class="p-3 flex-grow-1 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <p class="movie-title mb-0" th:text="${movie.title}"></p>
                        <span class="badge badge-year ms-2 flex-shrink-0" th:text="${movie.releaseYear}"></span>
                    </div>
                    <p class="movie-meta mb-1" th:text="${movie.filmDirector}"></p>
                    <p class="movie-meta" th:text="${movie.company}"></p>
                    <div class="mt-auto pt-2 d-flex gap-2">
                        <a th:href="@{/movie/{id}(id=${movie.id})}" class="btn btn-details flex-grow-1">Details</a>
                        <button th:if="${session.currentUser != null and session.currentUser.role.name() == 'ADMIN'}"
                                type="button" class="btn btn-outline-danger btn-sm h-100"
                                data-bs-toggle="modal" data-bs-target="#deleteModal"
                                th:data-movie-id="${movie.id}"
                                th:data-movie-title="${movie.title}">&#128465;</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <p th:if="${#lists.isEmpty(movies)}" class="text-center text-secondary mt-5 fs-5">No movies found.</p>

</div>

<form id="deleteForm" method="post"></form>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color:#1a1a1a; border:1px solid #3a3a3a; color:#f0f0f0;">
            <div class="modal-header" style="border-color:#2a2a2a;">
                <h5 class="modal-title">Delete movie</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete <strong id="deleteMovieTitle"></strong>?
            </div>
            <div class="modal-footer" style="border-color:#2a2a2a;">
                <button type="button" class="btn btn-outline-light btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="deleteForm" class="btn btn-danger btn-sm">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('deleteModal').addEventListener('show.bs.modal', function (event) {
        const btn = event.relatedTarget;
        document.getElementById('deleteMovieTitle').textContent = btn.dataset.movieTitle;
        document.getElementById('deleteForm').action = '/movies/delete/' + btn.dataset.movieId;
    });
</script>
</body>
</html>
