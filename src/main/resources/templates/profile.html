<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile — VideoRent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0f0f0f; color: #f0f0f0; }

        .navbar-custom {
            background-color: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e50914 !important;
            letter-spacing: 1px;
        }

        .card-dark {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            border-left: 4px solid #e50914;
            padding-left: 12px;
            margin-bottom: 1.5rem;
        }

        .info-label {
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 1rem;
            color: #f0f0f0;
            margin-bottom: 1rem;
        }

        .btn-back {
            border: 1px solid #444;
            color: #aaa;
            background: transparent;
            font-size: 0.9rem;
        }

        .btn-back:hover { border-color: #f0f0f0; color: #f0f0f0; }

        .rentals-table {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
        }

        .rentals-table table { margin: 0; color: #f0f0f0; }

        .rentals-table thead th {
            background-color: #2a2a2a;
            color: #aaa;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-color: #3a3a3a;
        }

        .rentals-table tbody td {
            border-color: #2a2a2a;
            vertical-align: middle;
        }

        .badge-returned {
            background-color: #1e7e34;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 4px;
        }

        .badge-rented {
            background-color: #e50914;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 4px;
        }

        .form-control, .form-select {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #f0f0f0;
            border-radius: 6px;
        }

        .form-control:focus {
            background-color: #2a2a2a;
            border-color: #e50914;
            color: #f0f0f0;
            box-shadow: none;
        }

        .modal-content {
            background-color: #1a1a1a;
            border: 1px solid #3a3a3a;
            color: #f0f0f0;
        }

        .modal-header, .modal-footer { border-color: #2a2a2a; }
    </style>
</head>
<body>

<nav class="navbar navbar-custom px-4 py-3 mb-5">
    <a th:href="@{/}" class="navbar-brand text-decoration-none">VIDEO<span style="color:#f0f0f0">RENT</span></a>
    <div class="d-flex align-items-center gap-3">
        <span th:text="${session.currentUser.fullName}" class="text-light"></span>
        <form method="post" th:action="@{/logout}" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container">
    <a th:href="@{/}" class="btn btn-back mb-4">&#8592; Back to movies</a>

    <div th:if="${param.passwordError}" class="alert alert-danger mb-4">
        Wrong current password.
    </div>

    <div class="row g-4">

        <!-- Personal info -->
        <div class="col-md-4">
            <div class="card-dark h-100">
                <p class="section-title">Personal info</p>

                <p class="info-label">Full name</p>
                <p class="info-value" th:text="${user.fullName}"></p>

                <p class="info-label">Phone</p>
                <p class="info-value" th:text="${user.telephoneNumber}"></p>

                <p class="info-label">Address</p>
                <p class="info-value" th:text="${user.homeAddress}"></p>

                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-outline-light btn-sm"
                            data-bs-toggle="modal" data-bs-target="#editModal">Edit</button>
                    <button class="btn btn-outline-secondary btn-sm"
                            data-bs-toggle="modal" data-bs-target="#passwordModal">Change password</button>
                </div>
            </div>
        </div>

        <!-- Rental history -->
        <div class="col-md-8">
            <p class="section-title">Rental history</p>

            <div th:if="${#lists.isEmpty(rentals)}" class="text-secondary">No rentals yet.</div>

            <div class="rentals-table" th:if="${!#lists.isEmpty(rentals)}">
                <table class="table table-dark mb-0">
                    <thead>
                        <tr>
                            <th>Movie</th>
                            <th>Media</th>
                            <th>Issued</th>
                            <th>Due</th>
                            <th>Returned</th>
                            <th>Total</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rental : ${rentals}">
                            <td th:text="${rental.copy.film.title}"></td>
                            <td th:text="${rental.copy.media.name}"></td>
                            <td th:text="${rental.issueDate}"></td>
                            <td th:text="${rental.dueDate}"></td>
                            <td>
                                <span th:if="${rental.returnDate != null}"
                                      class="badge badge-returned" th:text="${rental.returnDate}"></span>
                                <span th:if="${rental.returnDate == null}"
                                      class="badge badge-rented">On hand</span>
                            </td>
                            <td th:with="days=${rental.returnDate != null ?
                                    rental.returnDate.toEpochDay() - rental.issueDate.toEpochDay() :
                                    today.toEpochDay() - rental.issueDate.toEpochDay()},
                                    safeDays=${days < 1 ? 1 : days}">
                                <span th:text="${rental.copy.cost * safeDays} + ' ₽'"></span>
                                <small th:if="${rental.returnDate == null}" class="text-secondary d-block">current</small>
                            </td>
                            <td>
                                <!-- Extension request form (only if not returned) -->
                                <div th:if="${rental.returnDate == null}">
                                    <div th:if="${rental.extensionRequested}">
                                        <small class="text-warning">Requested: <span th:text="${rental.requestedDate}"></span></small>
                                    </div>
                                    <form th:if="${!rental.extensionRequested}"
                                          method="post"
                                          th:action="@{/rentals/{id}/extend(id=${rental.id})}"
                                          class="d-flex gap-1 align-items-center">
                                        <input type="date" name="requestedDate"
                                               class="form-control form-control-sm"
                                               style="width: 140px;" required>
                                        <button type="submit" class="btn btn-outline-warning btn-sm">Extend</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- Edit profile modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit profile</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" th:action="@{/profile/edit}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-secondary" style="font-size:0.8rem;">FULL NAME</label>
                        <input name="fullName" type="text" class="form-control"
                               th:value="${user.fullName}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary" style="font-size:0.8rem;">ADDRESS</label>
                        <input name="homeAddress" type="text" class="form-control"
                               th:value="${user.homeAddress}" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger btn-sm">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Change password modal -->
<div class="modal fade" id="passwordModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Change password</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" th:action="@{/profile/password}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-secondary" style="font-size:0.8rem;">CURRENT PASSWORD</label>
                        <input name="oldPassword" type="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary" style="font-size:0.8rem;">NEW PASSWORD</label>
                        <input name="newPassword" type="password" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger btn-sm">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
