<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Panel — VideoRent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0f0f0f; color: #f0f0f0; }

        .navbar-custom {
            background-color: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e50914 !important;
            letter-spacing: 1px;
        }

        .stat-card {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #e50914;
        }

        .stat-label {
            color: #888;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            border-left: 4px solid #e50914;
            padding-left: 12px;
            margin-bottom: 1.5rem;
        }

        .users-table {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
        }

        .users-table table { margin: 0; color: #f0f0f0; }

        .users-table thead th {
            background-color: #2a2a2a;
            color: #aaa;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-color: #3a3a3a;
        }

        .users-table tbody td {
            border-color: #2a2a2a;
            vertical-align: middle;
        }

        .btn-back {
            border: 1px solid #444;
            color: #aaa;
            background: transparent;
            font-size: 0.9rem;
        }

        .btn-back:hover { border-color: #f0f0f0; color: #f0f0f0; }

        .badge-blocked { background-color: #c0070f; font-size: 0.75rem; padding: 3px 10px; border-radius: 4px; }
        .badge-active  { background-color: #1e7e34; font-size: 0.75rem; padding: 3px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<nav class="navbar navbar-custom px-4 py-3 mb-5">
    <a th:href="@{/}" class="navbar-brand text-decoration-none">VIDEO<span style="color:#f0f0f0">RENT</span></a>
    <div class="dropdown">
        <button class="btn btn-outline-light btn-sm dropdown-toggle"
                type="button" data-bs-toggle="dropdown">
            <span th:text="${session.currentUser.fullName}"></span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end"
            style="background-color:#1a1a1a; border:1px solid #2a2a2a;">
            <li><a class="dropdown-item text-light" th:href="@{/profile}">My profile</a></li>
            <li><hr class="dropdown-divider" style="border-color:#2a2a2a;"></li>
            <li>
                <form method="post" th:action="@{/logout}">
                    <button type="submit" class="dropdown-item text-danger">Logout</button>
                </form>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <a th:href="@{/}" class="btn btn-back mb-4">&#8592; Back to movies</a>

    <!-- Stats -->
    <div class="row g-3 mb-5">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-value" th:text="${userCount}"></div>
                <div class="stat-label">Users</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-value" th:text="${movieCount}"></div>
                <div class="stat-label">Movies</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-value" th:text="${activeRentals}"></div>
                <div class="stat-label">Active rentals</div>
            </div>
        </div>
    </div>

    <!-- User list -->
    <p class="section-title">Users</p>

    <div class="users-table">
        <table class="table table-dark mb-0">
            <thead>
                <tr>
                    <th>Full name</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.fullName}"></td>
                    <td th:text="${user.telephoneNumber}"></td>
                    <td>
                        <span th:if="${user.isBlocked}" class="badge badge-blocked">Blocked</span>
                        <span th:if="${!user.isBlocked}" class="badge badge-active">Active</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/users/{id}(id=${user.id})}"
                           class="btn btn-outline-light btn-sm">View</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
