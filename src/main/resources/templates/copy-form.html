<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Copy — VideoRent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0f0f0f; color: #f0f0f0; }

        .navbar-custom {
            background-color: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e50914 !important;
            letter-spacing: 1px;
        }

        .form-box {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
        }

        .form-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .form-subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-label {
            color: #aaa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control, .form-select {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #f0f0f0;
            border-radius: 6px;
        }

        .form-control:focus, .form-select:focus {
            background-color: #2a2a2a;
            border-color: #e50914;
            color: #f0f0f0;
            box-shadow: none;
        }

        .form-select option {
            background-color: #2a2a2a;
        }

        .btn-save {
            background-color: #e50914;
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.6rem 2rem;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .btn-save:hover { background-color: #c0070f; color: #fff; }

        .btn-back {
            border: 1px solid #444;
            color: #aaa;
            background: transparent;
            font-size: 0.9rem;
        }

        .btn-back:hover { border-color: #f0f0f0; color: #f0f0f0; }

        .media-add-box {
            background-color: #222;
            border: 1px dashed #3a3a3a;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            margin-top: 0.5rem;
        }

        .media-add-box .form-control {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-custom px-4 py-3 mb-5">
    <a th:href="@{/}" class="navbar-brand text-decoration-none">VIDEO<span style="color:#f0f0f0">RENT</span></a>
</nav>

<div class="container">
    <a th:href="@{/movie/{id}(id=${movie.id})}" class="btn btn-back mb-4">&#8592; Back to movie</a>

    <div class="form-box">
        <h1 class="form-title" th:text="${editMode} ? 'Edit Copy' : 'Add Copy'"></h1>
        <p class="form-subtitle" th:text="${movie.title}"></p>

        <div class="mb-3" th:if="${!editMode}">
            <label for="mediaId" class="form-label">Media type</label>
            <select id="mediaId" name="mediaId" form="copyForm" class="form-select" required>
                <option value="" disabled selected>Select media type</option>
                <option th:each="m : ${mediaList}"
                        th:value="${m.id}"
                        th:text="${m.name}"></option>
            </select>
            <div class="media-add-box mt-2">
                <p class="info-label mb-2" style="font-size:0.75rem;">Add new media type</p>
                <form method="post" th:action="@{/media/add}" class="d-flex gap-2">
                    <input name="name" type="text" class="form-control"
                           placeholder="e.g. VHS" style="max-width: 200px;">
                    <input type="hidden" name="returnTo"
                           th:value="@{/movie/{id}/copies/add(id=${movie.id})}">
                    <button type="submit" class="btn btn-outline-light btn-sm">Add</button>
                </form>
            </div>
        </div>

        <div class="mb-3 info-block" th:if="${editMode}">
            <p class="info-label mb-1">Media type</p>
            <p class="info-value" th:text="${copy.media.name}"></p>
        </div>

        <form id="copyForm" method="post" th:action="${formAction}">
            <div class="mb-3">
                <label for="cost" class="form-label">Cost per day (₽)</label>
                <input id="cost" name="cost" type="number"
                       class="form-control" placeholder="100" min="1"
                       th:value="${copy?.cost}" required>
            </div>
            <div class="mb-4">
                <label for="count" class="form-label">Count</label>
                <input id="count" name="count" type="number"
                       class="form-control" placeholder="5" min="0"
                       th:value="${copy?.count}" required>
            </div>

            <button type="submit" class="btn btn-save">Save</button>
        </form>
    </div>
</div>

</body>
</html>
