<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login — VideoRent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #0f0f0f;
            color: #f0f0f0;
        }

        .navbar-custom {
            background-color: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e50914 !important;
            letter-spacing: 1px;
        }

        .form-box {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 440px;
            width: 100%;
        }

        .form-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .form-subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-label {
            color: #aaa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #f0f0f0;
            border-radius: 6px;
        }

        .form-control:focus {
            background-color: #2a2a2a;
            border-color: #e50914;
            color: #f0f0f0;
            box-shadow: none;
        }

        .form-control::placeholder {
            color: #555;
        }

        .btn-login {
            background-color: #e50914;
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.6rem;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #c0070f;
            color: #fff;
        }

        .register-link {
            color: #aaa;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #e50914;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-custom px-4 py-3 mb-5">
    <a th:href="@{/}" class="navbar-brand text-decoration-none">VIDEO<span style="color:#f0f0f0">RENT</span></a>
</nav>

<div class="d-flex justify-content-center">
    <div class="form-box">
        <h1 class="form-title">Welcome back</h1>
        <p class="form-subtitle">Enter your credentials to continue</p>

        <form method="post" th:action="@{/login}">
            <div class="mb-3">
                <label for="telephoneNumber" class="form-label">Phone</label>
                <input id="telephoneNumber" name="telephoneNumber" type="tel"
                       class="form-control" placeholder="+7 (900) 000-00-00"
                       maxlength="18" title="Format: +7 (XXX) XXX-XX-XX">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password"
                       class="form-control" placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-login w-100">Login</button>
        </form>

        <p th:if="${param.error}" class="mt-3 text-center" style="color: #e50914;">
            Invalid phone or password.
        </p>

        <div th:if="${blockedReason != null}" class="alert mt-3"
             style="background-color:#2a0a0a; border:1px solid #e50914; color:#f0f0f0;">
            <strong>Account blocked.</strong>
            <span th:text="${blockedReason}"></span>
        </div>

        <p class="register-link text-center mt-3">
            Don't have an account? <a th:href="@{/register}">Register</a>
        </p>
    </div>
</div>

<script>
    const phoneInput = document.getElementById('telephoneNumber');

    phoneInput.addEventListener('input', function () {
        let digits = this.value.replace(/\D/g, '');
        if (!digits.startsWith('7')) digits = '7' + digits;
        digits = digits.slice(0, 11);

        let result = '+7';
        if (digits.length > 1) result += ' (' + digits.slice(1, 4);
        if (digits.length > 4) result += ') ' + digits.slice(4, 7);
        if (digits.length > 7) result += '-' + digits.slice(7, 9);
        if (digits.length > 9) result += '-' + digits.slice(9, 11);

        this.value = result;
    });

    phoneInput.closest('form').addEventListener('submit', function () {
        phoneInput.value = '+' + phoneInput.value.replace(/\D/g, '');
    });
</script>
</body>
</html>
