<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Movie — VideoRent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #0f0f0f;
            color: #f0f0f0;
        }

        .navbar-custom {
            background-color: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e50914 !important;
            letter-spacing: 1px;
        }

        .form-box {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 600px;
            width: 100%;
        }

        .form-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .form-label {
            color: #aaa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #f0f0f0;
            border-radius: 6px;
        }

        .form-control:focus {
            background-color: #2a2a2a;
            border-color: #e50914;
            color: #f0f0f0;
            box-shadow: none;
        }

        .form-control::placeholder {
            color: #555;
        }

        .btn-save {
            background-color: #e50914;
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.6rem 2rem;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .btn-save:hover {
            background-color: #c0070f;
            color: #fff;
        }

        .btn-back {
            border: 1px solid #444;
            color: #aaa;
            background: transparent;
            font-size: 0.9rem;
        }

        .btn-back:hover {
            border-color: #f0f0f0;
            color: #f0f0f0;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-custom px-4 py-3 mb-5">
    <a th:href="@{/}" class="navbar-brand text-decoration-none">VIDEO<span style="color:#f0f0f0">RENT</span></a>
</nav>

<div class="container">
    <a th:href="${editMode} ? @{/movie/{id}(id=${movie.id})} : @{/}"
       class="btn btn-back mb-4">&#8592; Back</a>

    <div class="form-box">
        <h1 class="form-title" th:text="${editMode} ? 'Edit Movie' : 'Add Movie'"></h1>

        <form method="post"
              th:action="${editMode} ? @{/movies/edit/{id}(id=${movie.id})} : @{/movies/add}">
            <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                <input id="title" name="title" type="text"
                       class="form-control" placeholder="Movie title"
                       th:value="${movie?.title}" required>
            </div>
            <div class="mb-3">
                <label for="filmDirector" class="form-label">Director</label>
                <input id="filmDirector" name="filmDirector" type="text"
                       class="form-control" placeholder="Director name"
                       th:value="${movie?.filmDirector}" required>
            </div>
            <div class="mb-3">
                <label for="company" class="form-label">Company</label>
                <input id="company" name="company" type="text"
                       class="form-control" placeholder="Production company"
                       th:value="${movie?.company}" required>
            </div>
            <div class="mb-3">
                <label for="releaseYear" class="form-label">Release year</label>
                <input id="releaseYear" name="releaseYear" type="number"
                       class="form-control" placeholder="2024" min="1900" max="2100"
                       th:value="${movie?.releaseYear}" required>
            </div>
            <div class="mb-4">
                <label for="description" class="form-label">Description</label>
                <textarea id="description" name="description"
                          class="form-control" rows="4" placeholder="Movie description"
                          required th:text="${movie?.description}"></textarea>
            </div>

            <button type="submit" class="btn btn-save">Save</button>
        </form>
    </div>
</div>

</body>
</html>
